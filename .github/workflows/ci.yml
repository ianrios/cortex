name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # engines floor and the version we develop on
        node: [20, 24]
    steps:
      - uses: actions/checkout@v4

      # Must precede setup-node: `cache: pnpm` needs the pnpm binary.
      # Version comes from the packageManager field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # typecheck -> tests -> brickwall self-check against this repo
      - name: Check
        run: pnpm check
