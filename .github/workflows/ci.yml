name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Must precede setup-node: `cache: pnpm` needs the pnpm binary.
      # Version comes from the packageManager field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # typecheck -> tests -> brickwall self-check against this repo
      - name: Check
        run: pnpm check

      # brickwall ships engines >=20, but pnpm 11 needs node >=22.13, so
      # the floor can't run the toolchain. Prove the built, zero-dependency
      # CLI itself on the floor instead.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # --full explicitly: bare `brickwall` is diff mode, vacuous in CI
      # (ADR 0001). drift has no bin, so its floor proof is an import.
      - name: Self-check on the engines floor (node 20)
        run: |
          node --version
          node packages/brickwall/dist/cli.js --full
          node --input-type=module -e "const m = await import('./packages/drift/dist/index.js'); if (typeof m.runChecks !== 'function') process.exit(1); console.log('drift floor OK');"
          node packages/cortex/dist/cli.js init --dir "$(mktemp -d)"
